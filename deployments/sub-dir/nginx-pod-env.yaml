apiVersion: v1
kind: Pod
metadata:
  generateName: test-env-debug-
  annotations:
    argocd.argoproj.io/hook: PostSync  # Runs after sync succeeds
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    # Test these dynamic templates:
    argocd.argoproj.io/test-repo-url: "{{repoURL}}"  # Full repo URL
    argocd.argoproj.io/test-path: "{{path}}"         # e.g., "test-env"
    argocd.argoproj.io/test-branch: "{{targetRevision}}"  # e.g., "main"
    argocd.argoproj.io/test-app-name: "{{metadata.name}}" # App name
spec:
  restartPolicy: Never
  containers:
  - name: debug-env
    image: nginx:alpine
    command:
      - sh
      - -c
      - |
        echo "=== ArgoCD Auto-Injected Env Vars ==="
        env | grep ARGOCD || true
        echo "=== Annotation-Populated Env Vars ==="
        echo "REPO_URL: $TEST_REPO_URL"
        echo "PATH: $TEST_PATH"
        echo "BRANCH: $TEST_BRANCH"
        echo "APP_NAME: $TEST_APP_NAME"
        echo "POD_NAME: $POD_NAME"
        echo "NAMESPACE: $NAMESPACE"
        echo "=== Full Env Dump (first 20) ==="
        env | head -20
        sleep 3600  # Keep alive for inspection
    # Annotations auto-create matching env vars [web:21]
    env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
