apiVersion: v1
kind: Pod
metadata:
  name: test-env-debug
  # annotations:
    # argocd.argoproj.io/hook: PostSync  # Runs after sync succeeds
    # argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  restartPolicy: Never
  containers:
  - name: debug-env
    image: nginx:alpine
    command:
      - sh
      - -c
      - |
        echo "=== Guaranteed ArgoCD Env Vars (Always Populated) ==="
        echo "ARGOCD_APP_NAME: $ARGOCD_APP_NAME"
        echo "ARGOCD_APP_NAMESPACE: $ARGOCD_APP_NAMESPACE"
        echo "ARGOCD_APP_REVISION: $ARGOCD_APP_REVISION"  # Full Git URL for repo parsing
        echo "ARGOCD_APP_URL: $ARGOCD_APP_URL"
        echo "ARGOCD_APP_INSTANCE: $ARGOCD_APP_INSTANCE"
        echo ""
        echo "=== Full ARGOCD_ Vars ==="
        env | grep '^ARGOCD_' | sort
        echo "=== Annotation-Populated Env Vars ==="
        echo "REPO_URL: $TEST_REPO_URL"
        echo "PATH: $TEST_PATH"
        echo "BRANCH: $TEST_BRANCH"
        echo "APP_NAME: $TEST_APP_NAME"
        echo "POD_NAME: $POD_NAME"
        echo "NAMESPACE: $NAMESPACE"
        echo "=== Full Env Dump (first 20) ==="
        env | head -20
        sleep 3600  # Keep alive for inspection
    # Annotations auto-create matching env vars [web:21]
    env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
