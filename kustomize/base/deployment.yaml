apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        author: HarshPanchal
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.1
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "70Mi"
            cpu: "256m"
          limits:
            memory: "130Mi"
            cpu: "512m"
